/* ── AudioPlayer ── */
function AudioPlayer() {
  const [playing, setPlaying] = useState(false);
  const [prog, setProg]       = useState(0);   // 0–100
  const [vol, setVol]         = useState(70);
  const tickRef = useRef(null);
  const DURATION = 847;

  useEffect(() => {
    if (playing) {
      tickRef.current = setInterval(() => {
        setProg(p => {
          if (p >= 100) { setPlaying(false); return 0; }
          return +(p + 100/DURATION).toFixed(3);
        });
      }, 1000);
    } else clearInterval(tickRef.current);
    return () => clearInterval(tickRef.current);
  }, [playing]);

  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const cur = Math.floor(prog * DURATION / 100);

  const chapters = [
    { t:"0:00",  l:"מבוא לקשרים כימיים" },
    { t:"3:20",  l:"תהליכים אקסותרמיים" },
    { t:"7:45",  l:"תהליכים אנדותרמיים" },
    { t:"11:30", l:"חוק הס ויישומים" },
  ];

  const trackStyle = (v) => ({
    background: `linear-gradient(to left, rgba(255,255,255,0.25) ${100-v}%, rgba(255,255,255,0.85) ${100-v}%)`,
  });

  return (
    <div className="space-y-5 fade-up">
      {/* Player card */}
      <div className="bg-gradient-to-br from-indigo-600 via-violet-600 to-purple-700 rounded-3xl p-7 text-white shadow-2xl shadow-indigo-200">
        {/* Waveform */}
        <div className="flex items-end justify-center gap-px h-14 mb-6">
          {WAVE.map((h,i) => {
            const pct = i / WAVE.length * 100;
            return (
              <span key={i} className="wave-bar flex-shrink-0"
                style={{ height:`${h}px`, background: pct <= prog ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.25)" }} />
            );
          })}
        </div>

        {/* Meta */}
        <div className="text-center mb-5">
          <p className="text-white/60 text-xs mb-0.5">פרק לימודי • כימיה</p>
          <h3 className="text-lg font-bold">קשרים כימיים ואנרגיה</h3>
          <p className="text-white/55 text-xs mt-0.5">ד"ר מיכל לוי • {fmt(DURATION)}</p>
        </div>

        {/* Progress */}
        <div className="mb-4">
          <input type="range" min="0" max="100" step="0.1" value={prog}
                 onChange={e => setProg(+e.target.value)} style={trackStyle(prog)} />
          <div className="flex justify-between text-xs text-white/55 mt-1">
            <span>{fmt(cur)}</span>
            <span>{fmt(DURATION)}</span>
          </div>
        </div>

        {/* Controls */}
        <div className="flex items-center justify-center gap-5">
          <button onClick={() => setProg(p => Math.max(0, p-5))}
                  className="opacity-70 hover:opacity-100 transition-opacity p-2 hover:bg-white/10 rounded-full">
            <I.SkipBack size={20} />
          </button>
          <button onClick={() => setPlaying(p => !p)}
                  className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-transform">
            {playing
              ? <I.Pause size={20} className="text-indigo-600" />
              : <I.Play  size={20} className="text-indigo-600" style={{marginRight:"-2px"}} />}
          </button>
          <button onClick={() => setProg(p => Math.min(100, p+5))}
                  className="opacity-70 hover:opacity-100 transition-opacity p-2 hover:bg-white/10 rounded-full">
            <I.SkipFwd size={20} />
          </button>
        </div>

        {/* Volume */}
        <div className="flex items-center gap-3 mt-5">
          <I.Volume size={15} className="opacity-60 flex-shrink-0" />
          <input type="range" min="0" max="100" value={vol}
                 onChange={e => setVol(+e.target.value)} style={trackStyle(vol)} />
        </div>
      </div>

      {/* Chapter list */}
      <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
        <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">פרקי הפודקאסט</p>
        <div className="space-y-1">
          {chapters.map((c,i) => (
            <button key={i}
              className="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-indigo-50 transition-colors text-right group"
              onClick={() => setProg((i / chapters.length)*100)}>
              <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0 group-hover:bg-indigo-200 transition-colors">
                <span className="text-xs font-bold text-indigo-600">{i+1}</span>
              </div>
              <div className="flex-1">
                <p className="text-sm font-medium text-slate-700 group-hover:text-indigo-600 transition-colors">{c.l}</p>
                <p className="text-xs text-slate-400">{c.t}</p>
              </div>
              <I.Play size={13} className="text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity" />
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Quiz ── */
function Quiz({ onClose }) {
  const [qi, setQi]         = useState(0);
  const [answers, setAns]   = useState({});
  const [finished, setDone] = useState(false);

  const q       = QUIZ[qi];
  const picked  = answers[qi] ?? null;
  const answered = picked !== null;
  const correct  = picked === q.ans;

  const score = Object.keys(answers).filter(k => answers[k] === QUIZ[+k].ans).length;

  function pick(idx) {
    if (answered) return;
    setAns(prev => ({ ...prev, [qi]: idx }));
  }

  function next() {
    if (qi < QUIZ.length-1) setQi(qi+1);
    else setDone(true);
  }

  function reset() { setQi(0); setAns({}); setDone(false); }

  const optClass = (idx) => {
    const base = "w-full text-right flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-200 ";
    if (!answered) return base + "border-slate-200 hover:border-indigo-300 hover:bg-indigo-50/50 cursor-pointer";
    if (idx === q.ans) return base + "border-emerald-400 bg-emerald-50";
    if (idx === picked) return base + "border-red-400 bg-red-50";
    return base + "border-slate-100 opacity-50";
  };

  const badgeClass = (idx) => {
    const base = "w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 text-xs font-bold transition-colors ";
    if (!answered) return base + "bg-slate-100 text-slate-500";
    if (idx === q.ans) return base + "bg-emerald-500 text-white";
    if (idx === picked) return base + "bg-red-500 text-white";
    return base + "bg-slate-100 text-slate-400";
  };

  if (finished) {
    const pct = Math.round(score/QUIZ.length*100);
    const good = pct >= 67;
    return (
      <div className="text-center py-8 fade-up">
        <div className={`w-24 h-24 rounded-full mx-auto flex items-center justify-center mb-5 ${good ? "bg-emerald-100" : "bg-amber-100"}`}>
          <I.Trophy size={42} className={good ? "text-emerald-500" : "text-amber-500"} />
        </div>
        <h3 className="text-2xl font-black text-slate-800 mb-2">{good ? "כל הכבוד! עבודה מצוינת" : "כמעט — שווה לחזור על החומר"}</h3>
        <p className="text-slate-500 text-sm mb-1">ענית נכון על {score} מתוך {QUIZ.length} שאלות</p>
        <p className={`text-5xl font-black my-5 ${good ? "text-emerald-500" : "text-amber-500"}`}>{pct}%</p>
        <div className="flex gap-3 justify-center flex-wrap">
          <button onClick={reset}
                  className="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors font-medium flex items-center gap-2 text-sm shadow-sm shadow-indigo-200">
            <I.Reset size={15} />נסה שוב
          </button>
          <button onClick={onClose}
                  className="px-6 py-3 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition-colors font-medium text-sm">
            חזור ללמידה
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-5 fade-up">
      {/* Progress bar */}
      <div className="flex items-center gap-3">
        <div className="flex gap-1.5 flex-1">
          {QUIZ.map((_,i) => (
            <div key={i} className={`h-1.5 flex-1 rounded-full transition-colors ${
              i < qi ? "bg-indigo-500" : i === qi ? "bg-indigo-300" : "bg-slate-200"
            }`} />
          ))}
        </div>
        <span className="text-sm text-slate-400 whitespace-nowrap">{qi+1} / {QUIZ.length}</span>
      </div>

      {/* Question */}
      <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
        <p className="text-base font-bold text-slate-800 leading-relaxed">{q.q}</p>
      </div>

      {/* Options */}
      <div className="space-y-3">
        {q.opts.map((opt,idx) => (
          <button key={idx} onClick={() => pick(idx)} className={optClass(idx)}>
            <div className={badgeClass(idx)}>{String.fromCharCode(65+idx)}</div>
            <span className="flex-1 text-sm font-medium text-slate-700">{opt}</span>
            {answered && idx === q.ans  && <I.Check size={18} className="text-emerald-500 flex-shrink-0" />}
            {answered && idx === picked && idx !== q.ans && <I.X size={18} className="text-red-500 flex-shrink-0" />}
          </button>
        ))}
      </div>

      {/* Explanation */}
      {answered && (
        <div className={`rounded-2xl p-5 border fade-up ${correct ? "bg-emerald-50 border-emerald-200" : "bg-sky-50 border-sky-200"}`}>
          <div className="flex gap-3">
            <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 ${correct ? "bg-emerald-500" : "bg-sky-500"}`}>
              <I.Info size={14} className="text-white" />
            </div>
            <div>
              <p className={`text-sm font-bold mb-1.5 ${correct ? "text-emerald-800" : "text-sky-800"}`}>
                {correct ? "מצוין! תשובה נכונה" : `התשובה הנכונה היא ${String.fromCharCode(65+q.ans)}`}
              </p>
              <p className={`text-sm leading-relaxed ${correct ? "text-emerald-700" : "text-sky-700"}`}>{q.exp}</p>
            </div>
          </div>
        </div>
      )}

      {/* Nav */}
      <div className="flex items-center justify-between pt-1">
        <button onClick={reset}
                className="text-sm text-slate-400 hover:text-slate-600 flex items-center gap-1.5 transition-colors">
          <I.Reset size={13} />התחל מחדש
        </button>
        {answered && (
          <button onClick={next}
                  className="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors font-medium text-sm shadow-sm shadow-indigo-200 flex items-center gap-2">
            {qi < QUIZ.length-1 ? "שאלה הבאה" : "סיום"}
            <I.ChevronL size={16} />
          </button>
        )}
      </div>
    </div>
  );
}
